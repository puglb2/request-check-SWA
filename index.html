<!DOCTYPE html>
<html>
<head>
  <title>Request Tools</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h2>Request Tools</h2>

  <div class="card">
    <h3>Upload Request Packet (PDF)</h3>
    <input type="file" id="fileInput" accept="application/pdf" />
    <div class="row">
      <button onclick="extractOrder()">Extract Order Data</button>
      <button onclick="runHipaa(1)">HIPAA Checklist 1</button>
      <button onclick="runHipaa(2)">HIPAA Checklist 2</button>
    </div>
  </div>

  <div class="card">
    <h3>Response</h3>
    <pre id="output"></pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
